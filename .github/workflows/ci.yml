name: CI

on:
  push:
    branches: ['**']
  pull_request:

jobs:
  perl:
    name: perl reference implementation
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - run: t/check.sh

  c:
    name: C libraries
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # Before configuring, so find_package sees them: doxygen for the docs
      # target, lv2 for the plugin, sordi for validating its TTL.
      - name: Install build tools
        run: sudo apt-get update && sudo apt-get install -y doxygen lv2-dev sordi libwxgtk3.2-dev

      - name: Configure
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Debug

      - name: Build
        run: cmake --build build

      # The tests replay protocol/golden.json, which the perl implementation
      # generated, so this is what proves the port has not changed behaviour.
      - name: Test
        run: ctest --test-dir build --output-on-failure

      # Again with the sanitizers, so the truncated-input handling is checked
      # for reading past the buffer, not just for its return value.
      - name: Configure with sanitizers
        run: >
          cmake -S . -B build-asan -DCMAKE_BUILD_TYPE=Debug
          -DCMAKE_C_FLAGS="-fsanitize=address,undefined -fno-sanitize-recover=all"

      - name: Test with sanitizers
        run: |
          cmake --build build-asan
          ctest --test-dir build-asan --output-on-failure

      # Fails on an undocumented member, a @param that names an argument the
      # function does not have, or a broken reference - so the header comments
      # cannot rot away from the code.
      - name: Documentation
        run: cmake --build build --target docs
